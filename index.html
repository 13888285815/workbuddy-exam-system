<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>在线考试系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#185FA5;--blue-light:#E6F1FB;--green:#27500A;--green-bg:#EAF3DE;--red:#A32D2D;--red-bg:#FCEBEB;--amber:#854F0B;--amber-bg:#FAEEDA;--text:#1a1a2e;--text2:#555;--text3:#888;--border:#e8edf2;--bg:#f0f4f8;--white:#fff;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
img{max-width:100%;display:block}

/* ====== 入口页 ====== */
#entryPage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.entry-wrap{text-align:center;max-width:500px;padding:20px}
.entry-logo{width:72px;height:72px;background:var(--blue);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:24px}
.entry-logo svg{width:40px;height:40px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.entry-wrap h1{font-size:26px;font-weight:500;margin-bottom:8px}
.entry-wrap>p{color:var(--text3);font-size:14px;margin-bottom:32px}
.entry-cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.entry-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:28px 32px;width:220px;cursor:pointer;transition:all .2s;text-decoration:none;display:block}
.entry-card:hover{border-color:var(--blue);transform:translateY(-4px);box-shadow:0 8px 24px rgba(24,95,165,.12)}
.entry-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.entry-icon.admin{background:var(--green-bg)}
.entry-icon.exam{background:var(--amber-bg)}
.entry-card h2{font-size:16px;font-weight:500;margin-bottom:6px}
.entry-card p{font-size:12px;color:var(--text3);line-height:1.5}
.entry-footer{margin-top:40px;font-size:12px;color:#bbb}

/* ====== 登录框 ====== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--white);border-radius:16px;padding:32px;width:380px;max-width:95vw}
.modal-box h2{font-size:18px;font-weight:500;text-align:center;margin-bottom:4px}
.modal-box .sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color .15s}
input:focus{border-color:var(--blue)}
.modal-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.modal-btn:hover{background:#0C447C}
.modal-close{position:absolute;right:16px;top:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3)}
.modal-hint{text-align:center;margin-top:14px;font-size:12px;color:var(--text3)}

/* ====== 考生主页 ====== */
#studentHome{display:none;min-height:100vh}
.stu-header{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.stu-header h1{font-size:15px;font-weight:500}
.stu-header-right{display:flex;align-items:center;gap:12px}
.avatar{width:32px;height:32px;background:var(--amber-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--amber)}
.user-name{font-size:13px;color:var(--text2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);transition:all .15s;font-family:inherit}
.btn:hover{background:var(--bg)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.page-content{max-width:900px;margin:0 auto;padding:24px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.section-title{font-size:15px;font-weight:500;margin-bottom:16px}
.paper-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.paper-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.paper-card:hover{border-color:var(--blue)}
.paper-card h3{font-size:14px;font-weight:500;margin-bottom:10px}
.paper-meta{font-size:12px;color:var(--text3);line-height:1.8}
.start-btn{margin-top:14px;width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s}
.start-btn:hover{background:#0C447C}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}

/* ====== 考试页面 ====== */
#examPage{display:none;min-height:100vh}
.exam-header{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.exam-title{font-size:14px;font-weight:500;flex:1;text-align:center}
.timer{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--blue);background:var(--blue-light);padding:6px 14px;border-radius:20px}
.timer.warning{color:var(--red);background:var(--red-bg)}
.exam-body{max-width:800px;margin:0 auto;padding:24px;display:flex;gap:20px}
.exam-main{flex:1;min-width:0}
.exam-sidebar{width:200px;flex-shrink:0}

/* 题目 */
.q-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.q-num{background:var(--blue);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.q-num.answered{background:#639922}
.q-type-tag{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--blue-light);color:var(--blue)}
.q-score{font-size:11px;color:var(--text3)}
.q-text{font-size:14px;line-height:1.7;margin-bottom:14px}
/* 选项 */
.options{display:flex;flex-direction:column;gap:8px}
.option-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--text2)}
.option-item:hover{border-color:#aaa;background:#fafafa}
.option-item.selected{border-color:var(--blue);background:var(--blue-light);color:var(--text)}
.option-item input{margin-top:1px;flex-shrink:0;cursor:pointer;accent-color:var(--blue)}
/* 判断 */
.judge-options{display:flex;gap:12px}
.judge-btn{flex:1;padding:12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;font-size:13px;transition:all .15s;background:var(--white)}
.judge-btn:hover{border-color:#aaa;background:#fafafa}
.judge-btn.selected-true{border-color:#639922;background:var(--green-bg);color:var(--green);font-weight:500}
.judge-btn.selected-false{border-color:#e24b4a;background:var(--red-bg);color:var(--red);font-weight:500}
/* 填空/简答 */
.fill-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.fill-input:focus{border-color:var(--blue)}
textarea.fill-input{resize:vertical;min-height:100px}
/* 导航点 */
.dot-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.dot{width:32px;height:32px;border-radius:6px;background:var(--bg);border:1px solid var(--border);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text3)}
.dot:hover{border-color:#aaa}
.dot.ans{background:#639922;color:#fff;border-color:#639922}
.dot.cur{border-color:var(--blue);color:var(--blue);font-weight:500}
.sidebar-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.sidebar-card h4{font-size:13px;font-weight:500;margin-bottom:12px}
.submit-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.submit-btn:hover{background:#0C447C}
.progress-wrap{background:#f0f4f8;border-radius:20px;height:6px;overflow:hidden;margin:8px 0}
.progress-bar{height:100%;background:#639922;border-radius:20px;transition:width .3s}

/* ====== 成绩页面 ====== */
#resultPage{display:none;min-height:100vh}
.result-wrap{max-width:800px;margin:0 auto;padding:24px}
.result-hero{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;margin-bottom:20px}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid var(--blue)}
.score-circle.pass{border-color:#639922;background:#f0f8ea}
.score-circle.fail{border-color:#e24b4a;background:var(--red-bg)}
.score-num{font-size:36px;font-weight:500;line-height:1}
.score-total{font-size:12px;color:var(--text3);margin-top:4px}
.result-hero h2{font-size:20px;font-weight:500;margin-bottom:8px}
.result-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px}
.rst{text-align:center}
.rst .v{font-size:22px;font-weight:500}
.rst .l{font-size:12px;color:var(--text3);margin-top:4px}
/* 逐题解析 */
.review-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.review-card .r-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.r-status{font-size:11px;padding:2px 8px;border-radius:4px}
.r-correct{background:var(--green-bg);color:var(--green)}
.r-wrong{background:var(--red-bg);color:var(--red)}
.r-partial{background:var(--amber-bg);color:var(--amber)}
.r-q{font-size:13px;line-height:1.6;margin-bottom:8px}
.r-ans{font-size:12px;line-height:1.8}
.r-ans .my{color:var(--text2)}
.r-ans .std{color:var(--green);font-weight:500}
.r-explain{font-size:12px;color:var(--text3);margin-top:6px;padding:6px 10px;background:#fafafa;border-radius:6px}
/* 徽章 */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
/* Toast */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:999}
.toast{background:#1a1a2e;color:#fff;padding:12px 16px;border-radius:10px;font-size:13px;opacity:0;transform:translateX(20px);transition:all .3s;margin-bottom:8px}
.toast.show{opacity:1;transform:none}
.toast.error{background:var(--red)}

@media(max-width:640px){.exam-body{flex-direction:column}.exam-sidebar{width:100%}.result-stats{grid-template-columns:repeat(2,1fr)}.entry-cards{flex-direction:column;align-items:center}}
</style>
</head>
<body>

<!-- ========== 入口页 ========== -->
<div id="entryPage">
  <div class="entry-wrap">
    <div class="entry-logo">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
    </div>
    <h1>在线考试系统</h1>
    <p>支持 PDF 试卷导入，自动解析题目，在线作答实时评分</p>
    <div class="entry-cards">
      <a class="entry-card" href="admin.html">
        <div class="entry-icon admin">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><path d="M18 14l2 2 4-4"/></svg>
        </div>
        <h2>后台管理</h2>
        <p>用户管理、题库维护<br>试卷组卷、成绩统计</p>
      </a>
      <div class="entry-card" onclick="showLogin()">
        <div class="entry-icon exam">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#854F0B" stroke-width="1.8" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13l2 2 4-4"/></svg>
        </div>
        <h2>在线考试</h2>
        <p>选择试卷、限时作答<br>提交自动评分、查看成绩</p>
      </div>
    </div>
    <div class="entry-footer">
      管理员：admin / admin123<br>
      考生：student1 / 123456
    </div>
  </div>
</div>

<!-- ========== 登录弹窗 ========== -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box" style="position:relative">
    <button class="modal-close" onclick="closeLogin()">&times;</button>
    <h2>考生登录</h2>
    <p class="sub">登录后开始考试</p>
    <div class="form-group"><label>用户名</label><input id="loginUser" type="text" placeholder="请输入用户名"></div>
    <div class="form-group"><label>密码</label><input id="loginPass" type="password" placeholder="请输入密码"></div>
    <button class="modal-btn" onclick="doLogin()">登录</button>
    <p class="modal-hint">测试账号：student1 / 123456</p>
  </div>
</div>

<!-- ========== 考生主页 ========== -->
<div id="studentHome">
  <div class="stu-header">
    <div class="btn btn-sm" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </div>
    <h1>在线考试系统</h1>
    <div class="stu-header-right">
      <div class="avatar" id="stuAvatar">U</div>
      <span class="user-name" id="stuName">用户</span>
      <button class="btn btn-sm" onclick="logout()">退出</button>
    </div>
  </div>
  <div class="page-content">
    <div class="tabs">
      <div class="tab active" onclick="switchTab(this,'available')">可选试卷</div>
      <div class="tab" onclick="switchTab(this,'history')">考试记录</div>
    </div>
    <div id="tab-available">
      <div class="section-title">选择试卷开始考试</div>
      <div class="paper-grid" id="paperGrid"></div>
    </div>
    <div id="tab-history" style="display:none">
      <div class="section-title">我的考试记录</div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<!-- ========== 考试页面 ========== -->
<div id="examPage">
  <div class="exam-header">
    <span style="font-size:13px;color:var(--text3)" id="examUser"></span>
    <div class="exam-title" id="examTitle">试卷</div>
    <div class="timer" id="timer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="timerText">60:00</span>
    </div>
  </div>
  <div class="exam-body">
    <div class="exam-main" id="examQuestions"></div>
    <div class="exam-sidebar">
      <div class="sidebar-card">
        <h4>答题进度</h4>
        <div style="font-size:12px;color:var(--text3);margin-bottom:4px">已答 <strong id="answered">0</strong> / <strong id="total">0</strong> 题</div>
        <div class="progress-wrap"><div class="progress-bar" id="progress" style="width:0%"></div></div>
      </div>
      <div class="sidebar-card">
        <h4>题目导航</h4>
        <div class="dot-grid" id="dotGrid"></div>
      </div>
      <button class="submit-btn" onclick="confirmSubmit()">提交试卷</button>
    </div>
  </div>
</div>

<!-- ========== 成绩页面 ========== -->
<div id="resultPage">
  <div class="stu-header">
    <span></span>
    <h1>考试结果</h1>
    <button class="btn btn-sm" onclick="backHome()">返回首页</button>
  </div>
  <div class="result-wrap">
    <div class="result-hero">
      <div class="score-circle" id="scoreCircle">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-total" id="scoreDenom">/100</div>
      </div>
      <h2 id="verdict">成绩</h2>
      <p style="font-size:13px;color:var(--text3)" id="subtitle"></p>
      <div class="result-stats">
        <div class="rst"><div class="v" id="rs-correct">-</div><div class="l">答对</div></div>
        <div class="rst"><div class="v" id="rs-wrong">-</div><div class="l">答错</div></div>
        <div class="rst"><div class="v" id="rs-rate">-</div><div class="l">正确率</div></div>
        <div class="rst"><div class="v" id="rs-time">-</div><div class="l">用时</div></div>
      </div>
    </div>
    <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
      <h3 style="font-size:14px;font-weight:500;margin-bottom:16px">逐题解析</h3>
      <div id="reviewList"></div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ========== 数据层 ==========
const DB={
  get:k=>{try{return JSON.parse(localStorage.getItem('exam_'+k)||'null')}catch{return null}},
  set:(k,v)=>localStorage.setItem('exam_'+k,JSON.stringify(v)),
  users:()=>DB.get('users')||[],
  questions:()=>DB.get('questions')||[],
  papers:()=>DB.get('papers')||[],
  records:()=>DB.get('records')||[]
};

let currentUser=null, currentPaper=null, currentQuestions=[], userAnswers={};
let timerInterval=null, timeLeft=0, startTime=null;

// ========== 入口页 ==========
function showLogin(){
  document.getElementById('loginModal').classList.add('show');
  document.getElementById('loginUser').focus();
}
function closeLogin(){
  document.getElementById('loginModal').classList.remove('show');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

// ========== 登录/登出 ==========
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const user=DB.users().find(x=>x.username===u&&x.password===p&&x.status==='active');
  if(!user){showToast('用户名或密码错误','error');return;}
  currentUser=user;
  closeLogin();
  showStudentHome();
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function logout(){
  currentUser=null;
  showPage('entryPage');
}

// ========== 页面切换 ==========
function showPage(id){
  ['entryPage','studentHome','examPage','resultPage'].forEach(p=>{
    document.getElementById(p).style.display=p===id?'block':'none';
  });
}

// ========== 考生主页 ==========
function showStudentHome(){
  showPage('studentHome');
  document.getElementById('stuAvatar').textContent=currentUser.name[0];
  document.getElementById('stuName').textContent=currentUser.name;
  renderPapers();
}

function switchTab(el,tab){
  el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-available').style.display=tab==='available'?'block':'none';
  document.getElementById('tab-history').style.display=tab==='history'?'block':'none';
  if(tab==='history')renderHistory();
}

function renderPapers(){
  const papers=DB.papers().filter(p=>p.status==='published');
  const grid=document.getElementById('paperGrid');
  if(!papers.length){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1">暂无可用试卷，请联系管理员发布试卷</div>';
    return;
  }
  grid.innerHTML=papers.map(p=>{
    const qs=DB.questions().filter(q=>p.questionIds?.includes(q.id));
    return `<div class="paper-card">
      <h3>${p.name}</h3>
      <div class="paper-meta">
        <div>题目：${qs.length} 道</div>
        <div>时长：${p.duration} 分钟</div>
        <div>总分：${p.total} 分 · 及格：${p.pass} 分</div>
        ${p.desc?`<div>${p.desc}</div>`:''}
      </div>
      <button class="start-btn" onclick="startExam('${p.id}')">开始考试</button>
    </div>`;
  }).join('');
}

function renderHistory(){
  const records=DB.records().filter(r=>r.userId===currentUser.id).reverse();
  const list=document.getElementById('historyList');
  if(!records.length){
    list.innerHTML='<div class="empty">暂无考试记录</div>';
    return;
  }
  list.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:13px;background:var(--white);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)">
    <thead><tr style="background:#fafafa">
      <th style="text-align:left;padding:10px 14px;color:var(--text3);font-size:12px;border-bottom:1px solid var(--border)">试卷</th>
      <th style="text-align:left;padding:10px 14px;color:var(--text3);font-size:12px;border-bottom:1px solid var(--border)">得分</th>
      <th style="text-align:left;padding:10px 14px;color:var(--text3);font-size:12px;border-bottom:1px solid var(--border)">结果</th>
      <th style="text-align:left;padding:10px 14px;color:var(--text3);font-size:12px;border-bottom:1px solid var(--border)">时间</th>
    </tr></thead>
    <tbody>${records.map(r=>`<tr>
      <td style="padding:10px 14px;border-bottom:1px solid var(--border)">${r.paperName}</td>
      <td style="padding:10px 14px;border-bottom:1px solid var(--border)"><strong>${r.score}</strong> / ${r.total}</td>
      <td style="padding:10px 14px;border-bottom:1px solid var(--border)">${r.passed?'<span class="badge badge-green">通过</span>':'<span class="badge badge-red">未通过</span>'}</td>
      <td style="padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text3);font-size:12px">${r.time}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ========== 考试 ==========
function startExam(paperId){
  const paper=DB.papers().find(p=>p.id===paperId);
  if(!paper){showToast('试卷不存在','error');return;}
  const allQs=DB.questions();
  const qs=paper.questionIds?.map(id=>allQs.find(q=>q.id===id)).filter(Boolean)||[];
  if(!qs.length){showToast('该试卷暂无题目','error');return;}
  currentPaper=paper;
  currentQuestions=qs;
  userAnswers={};
  timeLeft=paper.duration*60;
  startTime=Date.now();
  showPage('examPage');
  document.getElementById('examTitle').textContent=paper.name;
  document.getElementById('examUser').textContent=currentUser.name;
  document.getElementById('total').textContent=qs.length;
  renderQuestions();
  startTimer();
}

function renderQuestions(){
  const typeLabel={single:'单选题',multi:'多选题',judge:'判断题',fill:'填空题',essay:'简答题'};
  document.getElementById('examQuestions').innerHTML=currentQuestions.map((q,i)=>`
    <div class="q-card" id="qcard-${i}">
      <div class="q-header">
        <div class="q-num ${isAnswered(q)?'answered':''}" id="qnum-${i}">${i+1}</div>
        <span class="q-type-tag">${typeLabel[q.type]}</span>
        <span class="q-score">${q.score}分</span>
      </div>
      <div class="q-text">${q.content}</div>
      ${renderInput(q,i)}
    </div>`).join('');
  renderDots();
  updateProgress();
}

function renderInput(q,i){
  if(q.type==='single'){
    return `<div class="options">${q.options.map((opt,oi)=>`
      <div class="option-item ${userAnswers[q.id]===opt[0]?'selected':''}" onclick="selectSingle('${q.id}',${i},'${opt[0]}')">
        <input type="radio" ${userAnswers[q.id]===opt[0]?'checked':''} style="pointer-events:none">
        <span>${opt}</span>
      </div>`).join('')}</div>`;
  }
  if(q.type==='multi'){
    const sel=(userAnswers[q.id]||[]);
    return `<div class="options">${q.options.map((opt,oi)=>`
      <div class="option-item ${sel.includes(opt[0])?'selected':''}" onclick="toggleMulti('${q.id}',${i},'${opt[0]}')">
        <input type="checkbox" ${sel.includes(opt[0])?'checked':''} style="pointer-events:none">
        <span>${opt}</span>
      </div>`).join('')}</div>
      <p style="font-size:11px;color:var(--text3);margin-top:8px">多选题</p>`;
  }
  if(q.type==='judge'){
    const val=userAnswers[q.id];
    return `<div class="judge-options">
      <div class="judge-btn ${val==='正确'?'selected-true':''}" onclick="selectJudge('${q.id}',${i},'正确')">✓ 正确</div>
      <div class="judge-btn ${val==='错误'?'selected-false':''}" onclick="selectJudge('${q.id}',${i},'错误')">✗ 错误</div>
    </div>`;
  }
  if(q.type==='fill'){
    return `<input class="fill-input" type="text" placeholder="请输入答案" value="${userAnswers[q.id]||''}" oninput="saveText('${q.id}',${i},this.value)">`;
  }
  if(q.type==='essay'){
    return `<textarea class="fill-input" rows="5" placeholder="请输入答案..." oninput="saveText('${q.id}',${i},this.value)">${userAnswers[q.id]||''}</textarea>
      <p style="font-size:11px;color:var(--text3);margin-top:6px">简答题由老师人工评分</p>`;
  }
  return '';
}

function selectSingle(qid,i,val){userAnswers[qid]=val;updateUI(i);}
function toggleMulti(qid,i,val){
  if(!userAnswers[qid])userAnswers[qid]=[];
  const arr=userAnswers[qid];
  const idx=arr.indexOf(val);
  if(idx>=0)arr.splice(idx,1);else arr.push(val);
  arr.sort();
  updateUI(i);
}
function selectJudge(qid,i,val){userAnswers[qid]=val;updateUI(i);}
function saveText(qid,i,val){userAnswers[qid]=val;updateDot(i);updateProgress();}

function updateUI(i){
  const q=currentQuestions[i];
  const card=document.getElementById('qcard-'+i);
  if(!card)return;
  const el=card.querySelector('.options,.judge-options,.fill-input');
  if(el){const t=document.createElement('div');t.innerHTML=renderInput(q,i);card.replaceChild(t.firstChild,el);}
  updateDot(i);
  updateProgress();
}
function updateDot(i){
  const q=currentQuestions[i];
  const dot=document.getElementById('dot-'+i);
  const num=document.getElementById('qnum-'+i);
  if(dot)dot.className='dot'+(isAnswered(q)?' ans':'');
  if(num)num.className='q-num'+(isAnswered(q)?' answered':'');
}
function isAnswered(q){
  const a=userAnswers[q.id];
  if(a===undefined||a===null||a==='')return false;
  if(Array.isArray(a))return a.length>0;
  return true;
}
function renderDots(){
  document.getElementById('dotGrid').innerHTML=currentQuestions.map((q,i)=>
    `<div class="dot ${isAnswered(q)?'ans':''}" id="dot-${i}" onclick="scrollToQ(${i})" title="第${i+1}题">${i+1}</div>`
  ).join('');
}
function scrollToQ(i){document.getElementById('qcard-'+i)?.scrollIntoView({behavior:'smooth',block:'center'});}
function updateProgress(){
  const ans=currentQuestions.filter(q=>isAnswered(q)).length;
  document.getElementById('answered').textContent=ans;
  document.getElementById('progress').style.width=Math.round(ans/currentQuestions.length*100)+'%';
  renderDots();
}

// ========== 计时器 ==========
function startTimer(){
  clearInterval(timerInterval);
  updateTimer();
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimer();
    if(timeLeft<=0){clearInterval(timerInterval);showToast('时间到，自动提交！');submitExam();}
    if(timeLeft===300)showToast('还剩5分钟！','error');
  },1000);
}
function updateTimer(){
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  document.getElementById('timerText').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('timer').className='timer'+(timeLeft<300?' warning':'');
}

// ========== 提交 ==========
function confirmSubmit(){
  const unanswered=currentQuestions.length-currentQuestions.filter(q=>isAnswered(q)).length;
  if(unanswered>0){
    if(!confirm(`还有 ${unanswered} 题未作答，确认提交？`))return;
  } else {
    if(!confirm('确认提交试卷？'))return;
  }
  submitExam();
}

function submitExam(){
  clearInterval(timerInterval);
  const usedSec=Math.round((Date.now()-startTime)/1000);
  const durationStr=`${Math.floor(usedSec/60)}分${usedSec%60}秒`;

  let totalScore=0,correct=0,wrong=0;
  const details=currentQuestions.map(q=>{
    const ua=userAnswers[q.id];
    let status='unanswered',got=0;
    if(q.type==='single'||q.type==='judge'){
      if(ua&&ua===q.answer){status='correct';got=q.score;correct++;}
      else if(ua){status='wrong';wrong++;}
    } else if(q.type==='multi'){
      const uaStr=(Array.isArray(ua)?ua.join(''):ua||'').toUpperCase().split('').sort().join('');
      const saStr=q.answer.toUpperCase().split('').sort().join('');
      if(uaStr===saStr){status='correct';got=q.score;correct++;}
      else if(ua&&ua.length>0){
        const hit=saStr.split('').filter(c=>uaStr.includes(c)).length;
        got=Math.floor(q.score*hit/saStr.length);
        if(hit>0&&hit<saStr.length){status='partial';}else{status='wrong';wrong++;}
      }
    } else if(q.type==='fill'){
      const ua2=(ua||'').trim().toLowerCase();
      const sa2=(q.answer||'').trim().toLowerCase();
      if(ua2&&(ua2===sa2||sa2.split(/[,，]/).map(s=>s.trim()).includes(ua2))){status='correct';got=q.score;correct++;}
      else if(ua2){status='wrong';wrong++;}
    } else if(q.type==='essay'){
      const ua2=(ua||'').toLowerCase();
      if(!ua2){status='unanswered';} else {
        const kw=(q.answer||'').toLowerCase().split(/\s+/).filter(w=>w.length>2).slice(0,5);
        const hit=kw.filter(k=>ua2.includes(k)).length;
        got=Math.round(q.score*(kw.length?hit/kw.length:0)*0.8);
        status=kw.length>0?(hit/kw.length>0.6?'correct':hit>0?'partial':'wrong'):'wrong';
        if(status==='correct')correct++;else if(status!=='unanswered')wrong++;
      }
    }
    totalScore+=got;
    return {type:q.type,content:q.content,options:q.options,ua,correctAns:q.answer,explain:q.explain,status,got,max:q.score};
  });

  const passed=totalScore>=currentPaper.pass;
  const record={id:'r'+Date.now(),userId:currentUser.id,userName:currentUser.name,
    paperId:currentPaper.id,paperName:currentPaper.name,score:totalScore,total:currentPaper.total,
    pass:currentPaper.pass,passed,correct,wrong,duration:durationStr,details,time:new Date().toLocaleString()};
  const records=DB.records();records.push(record);DB.set('records',records);
  showResult(record);
}

// ========== 成绩 ==========
function showResult(r){
  showPage('resultPage');
  const circle=document.getElementById('scoreCircle');
  circle.className='score-circle '+(r.passed?'pass':'fail');
  document.getElementById('scoreNum').textContent=r.score;
  document.getElementById('scoreDenom').textContent='/'+r.total;
  document.getElementById('verdict').textContent=r.passed?'恭喜，考试通过！':'很遗憾，未通过';
  document.getElementById('subtitle').textContent=`及格线 ${r.pass} 分 · 用时 ${r.duration}`;
  document.getElementById('rs-correct').textContent=r.correct;
  document.getElementById('rs-wrong').textContent=r.wrong;
  document.getElementById('rs-rate').textContent=Math.round(r.correct/currentQuestions.length*100)+'%';
  document.getElementById('rs-time').textContent=r.duration;

  const statusLabel={correct:'<span class="r-status r-correct">答对</span>',wrong:'<span class="r-status r-wrong">答错</span>',partial:'<span class="r-status r-partial">部分</span>',unanswered:'<span class="r-status" style="background:#f0f4f8;color:var(--text3)">未答</span>'};
  const typeLabel={single:'单选',multi:'多选',judge:'判断',fill:'填空',essay:'简答'};
  document.getElementById('reviewList').innerHTML=r.details.map((d,i)=>{
    let uaDisplay='未作答';
    if(d.ua!==undefined&&d.ua!==''&&d.ua!==null){
      uaDisplay=Array.isArray(d.ua)?d.ua.join(''):String(d.ua);
    }
    return `<div class="review-card">
      <div class="r-header">
        <strong style="font-size:13px">${i+1}.</strong>
        <span style="font-size:11px;padding:2px 6px;background:var(--blue-light);color:var(--blue);border-radius:4px">${typeLabel[d.type]}</span>
        ${statusLabel[d.status]||''}
        <span style="font-size:12px;color:var(--text3);margin-left:auto">得 ${d.got} / ${d.max} 分</span>
      </div>
      <div class="r-q">${d.content}</div>
      <div class="r-ans">
        <div class="my">我的答案：${uaDisplay||'未作答'}</div>
        <div class="std">正确答案：${d.correctAns||'-'}</div>
      </div>
      ${d.explain?`<div class="r-explain">解析：${d.explain}</div>`:''}
    </div>`;
  }).join('');
  window.scrollTo(0,0);
}

function backHome(){showStudentHome();}

// ========== Toast ==========
function showToast(msg,type=''){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  wrap.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);
}

// ========== 初始化 ==========
showPage('entryPage');
</script>
